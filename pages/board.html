<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <link rel="icon" href="../joinlogo.ico">
    <link rel="stylesheet" href="../css/board.css">
    <link rel="stylesheet" href="../css/nav-style.css">
    <script src="../js/mini_backend.js"></script>
    <script src="../js/board.js"></script>
    <script src="../js/include.js"></script>
    <script src="../js/nav.js"></script>
</head>

<body onload="initBoard()">
    <img onclick="toggleMenu()" class="responsive-menu" src="../img/menu.svg">

    <div onclick="leaveFullscreen()" class="d-none" id="fullscreen_background"></div>

    <nav id="nav" w3-include-html="nav.html"></nav>

    <main>
        <div class="board_column">
            <h2>To Do</h2>

            <div class="drag-area" id="ToDo" ondrop="moveToBox('ToDo'); removeHoverEffect('ToDo')"
                ondragleave="removeHoverEffect('ToDo')" ondragover="allowDrop(event); addHoverEffect('ToDo')"></div>
        </div>

        <div class="board_column">
            <h2>In Progress</h2>

            <div class="drag-area" id="InProgress" ondrop="moveToBox('InProgress'); removeHoverEffect('InProgress')"
                ondragleave="removeHoverEffect('InProgress')"
                ondragover="allowDrop(event); addHoverEffect('InProgress')"></div>
        </div>

        <div class="board_column">
            <h2>Testing</h2>

            <div class="drag-area" id="Testing" ondrop="moveToBox('Testing'); removeHoverEffect('Testing')"
                ondragleave="removeHoverEffect('Testing')" ondragover="allowDrop(event); addHoverEffect('Testing')">
            </div>
        </div>

        <div class="board_column">
            <h2>Done</h2>

            <div class="drag-area" id="Done" ondrop="moveToBox('Done'); removeHoverEffect('Done')"
                ondragleave="removeHoverEffect('Done')" ondragover="allowDrop(event); addHoverEffect('Done')"></div>
        </div>
    </main>
</body>

</html>
